kind = "web"
previewPath = "/"
title = "Vijay Bhemavarapu — Premium Websites"
version = "1.0.0"
id = "artifacts/vijay-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26094

[services.development]
run = "pnpm --filter @workspace/vijay-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vijay-portfolio", "run", "build" ]
publicDir = "artifacts/vijay-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26094"
BASE_PATH = "/"
